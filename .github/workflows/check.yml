name: KOFIA Check

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests beautifulsoup4
      - name: Run check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python check_kofia.py
      - name: Save last_id
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add last_id.txt || true
          git diff --staged --quiet || git commit -m "Update last_id"
          git push || true
